<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>

        Quine McCluskey Visualizer

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    >

    {% load static %}

    <link
        rel="stylesheet"
        href="{% static 'css/style.css' %}"
    >

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">

<div class="container py-2">

<a
class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2"
href="/"
>

<i class="bi bi-diagram-3-fill"></i>

<span>QM Visualizer</span>

</a>

<button
class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu"
>

<span class="navbar-toggler-icon"></span>

</button>

<div
class="collapse navbar-collapse"
id="menu"
>

<ul class="navbar-nav ms-auto align-items-lg-center gap-1">

<li class="nav-item">

<a class="nav-link px-3 py-2 rounded-pill{% if request.path == '/' %} active{% endif %}" href="/">

<i class="bi bi-house me-2"></i>
Beranda

</a>

</li>

<li class="nav-item">

<a class="nav-link px-3 py-2 rounded-pill{% if request.path == '/history/' %} active{% endif %}" href="/history/">

<i class="bi bi-clock-history me-2"></i>
Riwayat

</a>

</li>

<li class="nav-item">

<a class="nav-link px-3 py-2 rounded-pill{% if request.path == '/about/' %} active{% endif %}" href="/about/">

<i class="bi bi-info-circle me-2"></i>
Tentang

</a>

</li>

</ul>

</div>

</div>

</nav>

<div class="container py-4 py-md-5">

{% block content %}

{% endblock %}

</div>

<footer class="footer mt-5 py-5 border-top">
  <div class="container">
    <div class="row g-4 align-items-center text-center text-md-start">
      <div class="col-md-4">
        <h5 class="fw-semibold mb-2">Visualisasi Algoritma Quine-McCluskey</h5>
        <p class="text-muted mb-0">Pembelajaran interaktif untuk memahami penyederhanaan ekspresi Boolean.</p>
      </div>
      <div class="col-md-4 text-center">
        <div class="d-flex flex-wrap justify-content-center gap-2 mb-2">
          <span class="tech-pill">Python</span>
          <span class="tech-pill">Django</span>
          <span class="tech-pill">SQLite</span>
          <span class="tech-pill">Bootstrap</span>
        </div>
      </div>
      <div class="col-md-4 text-md-end text-center">
        <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="btn btn-outline-primary btn-sm me-2">
          <i class="bi bi-github me-2"></i>GitHub
        </a>
        <p class="small text-muted mt-3 mb-0">Made with <span class="text-danger">❤️</span> by Hapiz</p>
        <p class="small text-muted mb-0">© <span id="year-placeholder">2026</span></p>
      </div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const yearPlaceholder = document.getElementById('year-placeholder');
    if (yearPlaceholder) {
      yearPlaceholder.textContent = new Date().getFullYear();
    }
  });
</script>

<script src="{% static 'js/script.js' %}"></script>

</body>

</html>
